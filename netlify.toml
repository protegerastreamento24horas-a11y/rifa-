[build]
  command = "echo 'Site estático - nenhuma build necessária'"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[headers]
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=3600"

  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"

  [[headers.values]]
    key = "X-Frame-Options"
    value = "SAMEORIGIN"

  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"

  [[headers.values]]
    key = "Referrer-Policy"
    value = "strict-origin-when-cross-origin"

  [[headers.values]]
    key = "Access-Control-Allow-Origin"
    value = "*"

  [[headers.values]]
    key = "Access-Control-Allow-Methods"
    value = "GET,POST,OPTIONS"
