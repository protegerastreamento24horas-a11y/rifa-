<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rifa — Projeto</title>
  <meta name="description" content="Página para participar da rifa — informações e como contribuir.">
  <link rel="icon" href="/favicon.ico">
  <style>
    :focus { outline: 3px solid #005fcc; outline-offset: 2px; }
    .skip-link {
      position: absolute;
      left: -999px;
      top: auto;
      background: #000;
      color: #fff;
      padding: 8px;
      z-index: 1000;
    }
    .skip-link:focus { left: 1rem; top: 1rem; }
    nav ul { list-style: none; padding: 0; display:flex; gap:1rem; }
    nav a { text-decoration: none; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>

  <header role="banner">
    <nav role="navigation" aria-label="Menu principal">
      <ul>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#participar">Participar</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main id="main" role="main">
    <h1>Rifa — Concorra a prêmios</h1>
    <p id="sobre">Descrição clara do propósito da rifa e instruções de participação.</p>

    <section aria-labelledby="participar">
      <h2 id="participar">Como participar</h2>
      <form action="/participar" method="post" novalidate>
        <div>
          <label for="nome">Nome completo</label>
          <input id="nome" name="nome" type="text" required aria-required="true">
        </div>
        <div>
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required>
        </div>
        <button type="submit">Participar</button>
      </form>
    </section>

    <figure>
      <img src="img/premio.webp" alt="Prêmio: telefone celular preto em cima de uma mesa" loading="lazy">
      <figcaption>Foto ilustrativa do prêmio</figcaption>
    </figure>
  </main>

  <footer role="contentinfo">
    <p>© 2026 protegerastreamemento24horas-a11y</p>
  </footer>
</body>
</html>
