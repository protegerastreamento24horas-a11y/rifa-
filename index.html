<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Purchase</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Buy Your Tickets</h1>
        <form id="ticketForm">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <button type="submit">Purchase Ticket</button>
        </form>
        <div id="feedback"></div>
    </div>
    <script>
        document.getElementById('ticketForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            // Basic validation
            if (!name || !email) {
                displayFeedback('All fields are required.', true);
                return;
            }

            // Simulate ticket purchasing logic
            localStorage.setItem('ticketPurchase', JSON.stringify({ name, email }));
            displayFeedback('Ticket purchased successfully!');
        });

        function displayFeedback(message, isError = false) {
            const feedbackDiv = document.getElementById('feedback');
            feedbackDiv.textContent = message;
            feedbackDiv.style.color = isError ? 'red' : 'green';
        }
    </script>
</body>
</html>
